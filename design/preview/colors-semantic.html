<!doctype html><html><head><meta charset="utf-8"><title>Semantic colors</title><link rel="stylesheet" href="_base.css"></head>
<body><div class="card">
  <span class="label">Semantic / status</span>
  <div class="grid-4">
    <div class="swatch on-dark" style="background:#A32638;"><span class="name">Negative</span><span class="hex">#A32638 · maroon</span></div>
    <div class="swatch on-dark" style="background:#5B8C3E;"><span class="name">Positive</span><span class="hex">#5B8C3E</span></div>
    <div class="swatch on-light" style="background:#EBC73B;"><span class="name">Warn</span><span class="hex">#EBC73B · gold</span></div>
    <div class="swatch on-dark" style="background:#4A6E8A;"><span class="name">Info</span><span class="hex">#4A6E8A</span></div>
  </div>
  <div style="margin-top:10px; font-family:var(--font-body); font-size:12px; color:#949594;">Maroon doubles as primary <em>and</em> negative — context disambiguates. Info used sparingly.</div>
</div></body></html>
