<!doctype html><html><head><meta charset="utf-8"><title>Buttons</title><link rel="stylesheet" href="_base.css"></head>
<body><div class="card">
  <span class="label">Buttons — Saira upper, square, no radius</span>
  <div style="display:flex; gap:10px; align-items:center; flex-wrap:wrap;">
    <button class="btn btn-run">Run</button>
    <button class="btn btn-primary">Save Query</button>
    <button class="btn btn-ghost">Export CSV</button>
    <button class="btn btn-ghost btn-sm">Cancel</button>
    <button class="btn btn-primary btn-lg">Connect Node</button>
  </div>
  <div style="margin-top:18px; display:flex; gap:10px; align-items:center;">
    <button class="btn btn-run" style="background:#D8B62E;">Run · hover</button>
    <button class="btn btn-run" style="background:#C2A323;">Run · active</button>
    <button class="btn btn-primary" style="background:#8E1F31;">Save · hover</button>
    <button class="btn btn-primary" style="background:#7A1A2A;">Save · active</button>
  </div>
  <div style="margin-top:14px; font-family:var(--font-body); font-size:12px; color:#949594;">RUN is solid gold + black text — only one of these per surface. Never use opacity for hover.</div>
</div></body></html>
