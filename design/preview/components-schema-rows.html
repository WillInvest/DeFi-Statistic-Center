<!doctype html><html><head><meta charset="utf-8"><title>Schema rows</title><link rel="stylesheet" href="_base.css"></head>
<body><div class="card" style="padding:0; background:#363D45;">
  <div style="padding:10px 14px; border-bottom:1px solid #1A1F25;">
    <div style="font-family:var(--font-display); font-weight:700; font-size:12px; letter-spacing:0.18em; text-transform:uppercase; color:#949594;">Schema · uniswap_v3</div>
  </div>
  <!-- idle row -->
  <div style="height:28px; padding:0 14px; display:flex; align-items:center; gap:8px; border-left:3px solid transparent; font-family:var(--font-body); font-size:13px;">
    <span style="font-family:var(--font-mono); color:#949594;">▸</span><span>swaps</span>
    <span style="margin-left:auto; font-family:var(--font-mono); font-size:11px; color:#949594;">12 cols</span>
  </div>
  <!-- hover row -->
  <div style="height:28px; padding:0 14px; display:flex; align-items:center; gap:8px; border-left:3px solid transparent; background:rgba(163,38,56,0.18); font-family:var(--font-body); font-size:13px;">
    <span style="font-family:var(--font-mono); color:#949594;">▸</span><span>mints</span>
    <span style="margin-left:auto; font-family:var(--font-mono); font-size:11px; color:#949594;">9 cols</span>
  </div>
  <!-- selected row -->
  <div style="height:28px; padding:0 14px; display:flex; align-items:center; gap:8px; border-left:3px solid #EBC73B; background:rgba(163,38,56,0.18); font-family:var(--font-body); font-size:13px;">
    <span style="font-family:var(--font-mono); color:#EBC73B;">▾</span><span style="font-weight:600;">pools</span>
    <span style="margin-left:auto; font-family:var(--font-mono); font-size:11px; color:#949594;">14 cols</span>
  </div>
  <!-- expanded children -->
  <div style="height:24px; padding:0 14px 0 38px; display:flex; align-items:center; gap:8px; font-family:var(--font-mono); font-size:12px; color:#E4E5E6;">
    pool_address <span style="margin-left:auto; color:#949594;">address</span>
  </div>
  <div style="height:24px; padding:0 14px 0 38px; display:flex; align-items:center; gap:8px; font-family:var(--font-mono); font-size:12px; color:#E4E5E6;">
    fee_tier <span style="margin-left:auto; color:#949594;">int</span>
  </div>
  <div style="height:24px; padding:0 14px 0 38px; display:flex; align-items:center; gap:8px; font-family:var(--font-mono); font-size:12px; color:#E4E5E6;">
    token0 <span style="margin-left:auto; color:#949594;">address</span>
  </div>
</div></body></html>
