<!doctype html><html><head><meta charset="utf-8"><title>Iconography</title><link rel="stylesheet" href="_base.css"></head>
<body><div class="card">
  <span class="label">Iconography — Lucide, 1.5 stroke, currentColor</span>
  <div style="display:grid; grid-template-columns:repeat(8, 1fr); gap:14px; align-items:center;">
    <!-- using inline SVG copies of common Lucide glyphs at 1.5 stroke -->
    <div style="display:flex; flex-direction:column; align-items:center; gap:6px; color:#E4E5E6;">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="square" stroke-linejoin="miter"><ellipse cx="12" cy="5" rx="9" ry="3"/><path d="M3 5v14c0 1.66 4 3 9 3s9-1.34 9-3V5"/><path d="M3 12c0 1.66 4 3 9 3s9-1.34 9-3"/></svg>
      <span style="font-family:var(--font-mono); font-size:10px; color:#949594;">database</span>
    </div>
    <div style="display:flex; flex-direction:column; align-items:center; gap:6px; color:#E4E5E6;">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="square" stroke-linejoin="miter"><rect x="3" y="3" width="18" height="18"/><path d="M3 9h18M3 15h18M9 3v18M15 3v18"/></svg>
      <span style="font-family:var(--font-mono); font-size:10px; color:#949594;">table</span>
    </div>
    <div style="display:flex; flex-direction:column; align-items:center; gap:6px; color:#E4E5E6;">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="square" stroke-linejoin="miter"><path d="M3 3v18h18"/><path d="M7 14l4-4 4 4 5-5"/></svg>
      <span style="font-family:var(--font-mono); font-size:10px; color:#949594;">line-chart</span>
    </div>
    <div style="display:flex; flex-direction:column; align-items:center; gap:6px; color:#E4E5E6;">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="square" stroke-linejoin="miter"><path d="M3 3v18h18"/><rect x="6" y="12" width="3" height="6"/><rect x="11" y="8" width="3" height="10"/><rect x="16" y="5" width="3" height="13"/></svg>
      <span style="font-family:var(--font-mono); font-size:10px; color:#949594;">bar-chart</span>
    </div>
    <div style="display:flex; flex-direction:column; align-items:center; gap:6px; color:#E4E5E6;">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="square" stroke-linejoin="miter"><polygon points="5 3 19 12 5 21 5 3"/></svg>
      <span style="font-family:var(--font-mono); font-size:10px; color:#949594;">run</span>
    </div>
    <div style="display:flex; flex-direction:column; align-items:center; gap:6px; color:#E4E5E6;">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="square" stroke-linejoin="miter"><path d="M19 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11l5 5v11a2 2 0 0 1-2 2z"/><polyline points="17 21 17 13 7 13 7 21"/><polyline points="7 3 7 8 15 8"/></svg>
      <span style="font-family:var(--font-mono); font-size:10px; color:#949594;">save</span>
    </div>
    <div style="display:flex; flex-direction:column; align-items:center; gap:6px; color:#E4E5E6;">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="square" stroke-linejoin="miter"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
      <span style="font-family:var(--font-mono); font-size:10px; color:#949594;">export</span>
    </div>
    <div style="display:flex; flex-direction:column; align-items:center; gap:6px; color:#E4E5E6;">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="square" stroke-linejoin="miter"><circle cx="11" cy="11" r="7"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
      <span style="font-family:var(--font-mono); font-size:10px; color:#949594;">search</span>
    </div>
    <div style="display:flex; flex-direction:column; align-items:center; gap:6px; color:#EBC73B;">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="square" stroke-linejoin="miter"><polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/></svg>
      <span style="font-family:var(--font-mono); font-size:10px; color:#949594;">activity</span>
    </div>
    <div style="display:flex; flex-direction:column; align-items:center; gap:6px; color:#E4E5E6;">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="square" stroke-linejoin="miter"><circle cx="12" cy="12" r="9"/><path d="M12 7v5l3 2"/></svg>
      <span style="font-family:var(--font-mono); font-size:10px; color:#949594;">clock</span>
    </div>
    <div style="display:flex; flex-direction:column; align-items:center; gap:6px; color:#E4E5E6;">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="square" stroke-linejoin="miter"><path d="M3 3h18v18H3z"/><path d="M9 9h6v6H9z"/></svg>
      <span style="font-family:var(--font-mono); font-size:10px; color:#949594;">block</span>
    </div>
    <div style="display:flex; flex-direction:column; align-items:center; gap:6px; color:#E4E5E6;">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="square" stroke-linejoin="miter"><path d="M17 3l4 4-4 4"/><path d="M3 7h18"/><path d="M7 21l-4-4 4-4"/><path d="M21 17H3"/></svg>
      <span style="font-family:var(--font-mono); font-size:10px; color:#949594;">swap</span>
    </div>
    <div style="display:flex; flex-direction:column; align-items:center; gap:6px; color:#E4E5E6;">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="square" stroke-linejoin="miter"><path d="M12 5v14"/><path d="M5 12h14"/></svg>
      <span style="font-family:var(--font-mono); font-size:10px; color:#949594;">add-liq</span>
    </div>
    <div style="display:flex; flex-direction:column; align-items:center; gap:6px; color:#E4E5E6;">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="square" stroke-linejoin="miter"><path d="M5 12h14"/></svg>
      <span style="font-family:var(--font-mono); font-size:10px; color:#949594;">remove-liq</span>
    </div>
    <div style="display:flex; flex-direction:column; align-items:center; gap:6px; color:#E4E5E6;">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="square" stroke-linejoin="miter"><polyline points="15 3 21 3 21 9"/><polyline points="9 21 3 21 3 15"/><line x1="21" y1="3" x2="14" y2="10"/><line x1="3" y1="21" x2="10" y2="14"/></svg>
      <span style="font-family:var(--font-mono); font-size:10px; color:#949594;">expand</span>
    </div>
    <div style="display:flex; flex-direction:column; align-items:center; gap:6px; color:#E4E5E6;">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="square" stroke-linejoin="miter"><circle cx="12" cy="12" r="9"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>
      <span style="font-family:var(--font-mono); font-size:10px; color:#949594;">info</span>
    </div>
  </div>
  <div style="margin-top:14px; font-family:var(--font-body); font-size:12px; color:#949594;">Lucide via CDN substitution. 14 px in dense rows · 16 px toolbars · 18 px tabs.</div>
</div></body></html>
