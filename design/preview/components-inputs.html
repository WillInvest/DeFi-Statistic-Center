<!doctype html><html><head><meta charset="utf-8"><title>Inputs</title><link rel="stylesheet" href="_base.css"></head>
<body><div class="card">
  <span class="label">Inputs &amp; selects</span>
  <div style="display:flex; gap:10px; align-items:center; flex-wrap:wrap;">
    <input class="input" placeholder="Search schema…" style="width:220px;">
    <input class="input" value="0x88e6cFF…5640" style="width:200px; font-family:var(--font-mono);">
    <select class="select" style="width:160px;"><option>Mainnet</option><option>Sepolia</option></select>
    <input class="input" value="" placeholder="Focused" style="width:140px; border-color:#EBC73B;">
  </div>
  <div style="margin-top:14px; display:flex; gap:14px; align-items:center;">
    <label style="display:flex; align-items:center; gap:8px; font-family:var(--font-body); font-size:13px;">
      <input type="checkbox" checked style="accent-color:#A32638; width:14px; height:14px;"> Auto-refresh
    </label>
    <label style="display:flex; align-items:center; gap:8px; font-family:var(--font-body); font-size:13px;">
      <input type="radio" name="net" checked style="accent-color:#A32638;"> Mainnet
    </label>
    <label style="display:flex; align-items:center; gap:8px; font-family:var(--font-body); font-size:13px;">
      <input type="radio" name="net" style="accent-color:#A32638;"> Sepolia
    </label>
  </div>
  <div style="margin-top:14px; font-family:var(--font-body); font-size:12px; color:#949594;">Inputs sit on editor-bg. Focus = 1 px gold border, no glow, no radius.</div>
</div></body></html>
