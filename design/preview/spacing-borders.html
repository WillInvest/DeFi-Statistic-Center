<!doctype html><html><head><meta charset="utf-8"><title>Borders & rules</title><link rel="stylesheet" href="_base.css"></head>
<body><div class="card">
  <span class="label">Borders &amp; rules</span>
  <div style="display:flex; flex-direction:column; gap:12px;">

    <!-- 1px on dark — show two panels separated by the hairline so the divider is unmistakable -->
    <div style="display:flex; align-items:center; gap:14px;">
      <div style="width:220px;">
        <div style="background:#363D45; height:18px;"></div>
        <div style="background:#1A1F25; height:1px;"></div>
        <div style="background:#363D45; height:18px;"></div>
      </div>
      <div style="font-family:var(--font-mono); font-size:11px; color:#949594;">1 px hairline · #1A1F25 (between charcoal panels)</div>
    </div>

    <div style="display:flex; align-items:center; gap:14px;">
      <div style="width:220px;">
        <div style="background:#E4E5E6; height:18px;"></div>
        <div style="background:#BFC1C3; height:1px;"></div>
        <div style="background:#E4E5E6; height:18px;"></div>
      </div>
      <div style="font-family:var(--font-mono); font-size:11px; color:#949594;">1 px hairline · #BFC1C3 (between off-white rows)</div>
    </div>

    <div style="display:flex; align-items:center; gap:14px;">
      <div style="width:220px;">
        <div style="background:#E4E5E6; height:18px;"></div>
        <div style="background:#A32638; height:2px;"></div>
        <div style="background:#FFFFFE; height:18px;"></div>
      </div>
      <div style="font-family:var(--font-mono); font-size:11px; color:#949594;">2 px maroon · table header bottom rule</div>
    </div>

    <div style="display:flex; align-items:center; gap:14px;">
      <div style="width:220px; height:36px; display:flex;">
        <div style="background:#EBC73B; width:3px; height:100%;"></div>
        <div style="background:rgba(163,38,56,0.18); flex:1;"></div>
      </div>
      <div style="font-family:var(--font-mono); font-size:11px; color:#949594;">3 px gold · selected schema row left edge</div>
    </div>

    <div style="display:flex; align-items:center; gap:14px;">
      <div style="width:220px;">
        <div style="background:#A32638; height:32px;"></div>
        <div style="background:#EBC73B; height:4px;"></div>
      </div>
      <div style="font-family:var(--font-mono); font-size:11px; color:#949594;">4 px gold · brand-strip underline</div>
    </div>

  </div>
  <div style="margin-top:16px; font-family:var(--font-body); font-size:12px; color:#949594;">No shadows. No radius. Hard edges only — <code style="font-family:var(--font-mono);">border-radius: 0</code>.</div>
</div></body></html>
