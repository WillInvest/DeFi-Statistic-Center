<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>DSC · Mempool</title>
<link rel="stylesheet" href="../../colors_and_type.css">
<style>
  html, body, #root { height: 100%; margin: 0; }
  body { background: #1E2329; overflow: hidden; }
</style>
</head>
<body>
<div id="root"></div>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<script type="text/babel" src="../query_workbench/BrandStrip.jsx"></script>
<script type="text/babel" src="../query_workbench/StatusBar.jsx"></script>
<script type="text/babel" src="MempoolHeader.jsx"></script>
<script type="text/babel" src="FeeGrid.jsx"></script>
<script type="text/babel" src="TxList.jsx"></script>

<script type="text/babel">
const TYPES = ['SWAP', 'ADD LIQ', 'REMOVE LIQ', 'XFER', 'CONTRACT'];
const ADDRS = ['0x4a2c…f81e','0x88e6…5640','0x7a25…488D','0xC36C…E2A1','0xb1f2…9a07','0xDac1…1ec7','0xa0b8…6Eb4','0x6B17…2e48'];
const rand = a => a[Math.floor(Math.random() * a.length)];
const mkHash = () => '0x' + Math.floor(Math.random() * 16**16).toString(16).padStart(16,'0').slice(0,4) + '…' + Math.floor(Math.random()*16**16).toString(16).slice(0,4);

function mkRow(age) {
  const type = rand(TYPES);
  const status = age < 3 ? 'PENDING' : (Math.random() < 0.92 ? 'CONFIRMED' : 'REVERTED');
  return {
    hash: mkHash() + Math.random(),
    type,
    from: rand(ADDRS),
    to: rand(ADDRS),
    value: (Math.random() * 5).toFixed(4),
    gas: (18 + Math.floor(Math.random() * 30)),
    fee: (Math.random() * 0.02).toFixed(4),
    status,
    age: age < 1 ? '<1s' : (age < 60 ? `${age}s` : `${Math.floor(age/60)}m`),
  };
}

const INITIAL_BUCKETS = [
  { range: '> 60 gwei', count: 24,   eta: 'next block' },
  { range: '40-60 gwei', count: 142, eta: '1 block' },
  { range: '30-40 gwei', count: 581, eta: '1-2 blocks' },
  { range: '20-30 gwei', count: 1284, eta: '2-3 blocks' },
  { range: '15-20 gwei', count: 904, eta: '3-5 blocks' },
  { range: '10-15 gwei', count: 612, eta: '5-10 blocks' },
  { range: '5-10 gwei',  count: 248, eta: '10+ blocks' },
  { range: '< 5 gwei',   count: 89,  eta: 'speculative' },
];

function App() {
  const [rows, setRows] = React.useState(() => Array.from({ length: 18 }, (_, i) => mkRow(i)));
  const [filter, setFilter] = React.useState('ALL');
  const [block, setBlock] = React.useState(19482901);
  const [pending, setPending] = React.useState(3884);

  React.useEffect(() => {
    const t = setInterval(() => {
      setRows(prev => [mkRow(0), ...prev].slice(0, 24));
      setPending(p => p + Math.floor(Math.random() * 10) - 5);
      if (Math.random() < 0.15) setBlock(b => b + 1);
    }, 2200);
    return () => clearInterval(t);
  }, []);

  const visible = filter === 'ALL' ? rows : rows.filter(r => r.type === filter);

  return (
    <div data-screen-label="Mempool"
         style={{ display: 'grid', gridTemplateRows: '56px auto 1fr 28px', height: '100vh',
                  background: '#1E2329', color: '#E4E5E6' }}>
      <BrandStrip activeNav="Mempool" block={block.toLocaleString()} />
      <MempoolHeader block={block} gas={32} baseFee={28} pending={pending} gasTrend="↑ 4 gwei · 1m" />
      <div style={{ display: 'grid', gridTemplateColumns: '420px 1fr', minHeight: 0 }}>
        <FeeGrid buckets={INITIAL_BUCKETS} />
        <TxList rows={visible} filter={filter} onFilter={setFilter} />
      </div>
      <StatusBar block={block.toLocaleString()} latency="2.0 s" />
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
